
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduTools - Career Utility Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat&family=Dancing+Script&family=Indie+Flower&family=Shadows+Into+Light&family=Patrick+Hand&family=Satisfy&family=Gloria+Hallelujah&family=Homemade+Apple&family=Reenie+Beanie&family=Nothing+You+Could+Do&family=Just+Me+Again+Down+Here&family=Waiting+for+the+Sunrise&family=Bad+Script&family=Architects+Daughter&family=Coming+Soon&family=Kalam&family=Mali&family=Itim&family=Pangolin&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --margin-color: #ffadad;
        --line-color: #c2d1db;
        --paper-bg: #ffffff;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f4f7f6;
      }
      
      /* High-Fidelity Page Structure */
      .page-container-super {
        display: flex;
        justify-content: center;
        padding: 20px 0;
      }

      .page-a {
        background-color: var(--paper-bg);
        width: 100%;
        max-width: 800px;
        min-height: 1123px;
        position: relative;
        box-shadow: 0 4px 25px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition: all 0.3s ease;
      }

      .page-a.landscape {
        max-width: 1123px;
        min-height: auto;
        aspect-ratio: 1.53 / 1;
      }

      .top-margin {
        width: 100%;
        border-bottom: 1.5px solid var(--margin-color);
        position: relative;
        z-index: 10;
        outline: none;
      }

      .left-margin-and-content {
        display: flex;
        flex: 1;
        position: relative;
        min-height: 1003px;
      }

      .left-margin {
        width: 80px;
        border-right: 1.5px solid var(--margin-color);
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        z-index: 10;
        outline: none;
      }

      .paper-content {
        flex: 1;
        padding-left: 95px;
        padding-right: 40px;
        padding-top: 5px;
        padding-bottom: 40px;
        outline: none;
        position: relative;
        z-index: 5;
        background-image: linear-gradient(var(--line-color) 1.2px, transparent 1.2px);
      }

      .paper-content.no-lines {
        background-image: none !important;
      }
      
      .paper-content.no-left-margin {
        padding-left: 40px !important;
      }

      /* Texture Overlay for Realism */
      .overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
        z-index: 20;
        background-image: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
        opacity: 0.12;
      }

      /* Result Section Styling */
      .resultbaliclass {
        background: #fff;
        border-radius: 30px;
        margin-top: 40px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.05);
      }
      .resultdekho {
        font-size: 28px;
        font-weight: 900;
        color: #002366;
        text-align: center;
        margin-bottom: 20px;
      }

      .imp-button {
        background-color: #002366;
        color: white;
        padding: 12px 24px;
        border-radius: 12px;
        font-weight: 700;
        transition: all 0.2s;
      }
      .imp-button:hover { background-color: #001a4d; transform: translateY(-2px); }

      .delete-button {
        background-color: #fee2e2;
        color: #ef4444;
        padding: 12px 24px;
        border-radius: 12px;
        font-weight: 700;
        margin-left: 10px;
      }
      
      .generatenewbutton {
        display: inline-block;
        margin-left: 15px;
        color: #3b82f6;
        font-weight: 700;
        text-decoration: underline;
      }

      /* Spinner Styles */
      .spinner-box {
        height: 100px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .pulse-container {
        width: 120px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .pulse-bubble {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background-color: #002366;
      }
      .pulse-bubble-1 { animation: pulse 0.4s ease 0s infinite alternate; }
      .pulse-bubble-2 { animation: pulse 0.4s ease 0.2s infinite alternate; }
      .pulse-bubble-3 { animation: pulse 0.4s ease 0.4s infinite alternate; }
      @keyframes pulse {
        from { opacity: 1; transform: scale(1); }
        to { opacity: .25; transform: scale(.75); }
      }

      @media print {
        @page { size: A4; margin: 0; }
        body { background: white; }
        .page-a { box-shadow: none !important; margin: 0 !important; width: 210mm; min-height: 297mm; }
        header, aside, .no-print, .resultbaliclass { display: none !important; }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #f1f1f1; }
      ::-webkit-scrollbar-thumb { background: #002366; border-radius: 4px; }

      /* Markdown Styles */
      .markdown-body p { margin-bottom: 0.5rem; }
      .markdown-body ul, .markdown-body ol { margin-bottom: 0.5rem; padding-left: 1.25rem; }
      .markdown-body li { margin-bottom: 0.25rem; }
      .markdown-body h1, .markdown-body h2, .markdown-body h3 { font-weight: 800; margin-top: 1rem; margin-bottom: 0.5rem; }
      .markdown-body strong { font-weight: 700; }
    </style>
</head>
  <body class="bg-gray-50 text-slate-900">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
